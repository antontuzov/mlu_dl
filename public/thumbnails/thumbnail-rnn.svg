<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Unrolled RNN cells -->
  <g transform="translate(30,60)">
    <!-- Cell 1 -->
    <circle cx="40" cy="40" r="28" fill="white" opacity="0.2" stroke="white" stroke-width="2"/>
    <text x="40" y="45" fill="white" font-size="16" text-anchor="middle" font-family="sans-serif" font-weight="bold">h₁</text>
    <line x1="40" y1="68" x2="40" y2="95" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="40" y="108" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">x₁</text>
    <line x1="40" y1="12" x2="40" y2="-8" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="40" y="-14" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">y₁</text>
    <!-- Arrow -->
    <path d="M68 40 L100 40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M96 35 L103 40 L96 45" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cell 2 -->
    <circle cx="135" cy="40" r="28" fill="white" opacity="0.25" stroke="white" stroke-width="2"/>
    <text x="135" y="45" fill="white" font-size="16" text-anchor="middle" font-family="sans-serif" font-weight="bold">h₂</text>
    <line x1="135" y1="68" x2="135" y2="95" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="135" y="108" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">x₂</text>
    <line x1="135" y1="12" x2="135" y2="-8" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="135" y="-14" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">y₂</text>
    <!-- Arrow -->
    <path d="M163 40 L195 40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M191 35 L198 40 L191 45" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cell 3 -->
    <circle cx="230" cy="40" r="28" fill="white" opacity="0.3" stroke="white" stroke-width="2"/>
    <text x="230" y="45" fill="white" font-size="16" text-anchor="middle" font-family="sans-serif" font-weight="bold">h₃</text>
    <line x1="230" y1="68" x2="230" y2="95" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="230" y="108" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">x₃</text>
    <line x1="230" y1="12" x2="230" y2="-8" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <text x="230" y="-14" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">y₃</text>
    <!-- Arrow -->
    <path d="M258 40 L285 40" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 3"/>
    <text x="305" y="45" fill="white" font-size="18" text-anchor="middle" font-family="sans-serif" opacity="0.6">···</text>
  </g>
  <!-- LSTM gate diagram -->
  <g transform="translate(70,155)">
    <rect width="60" height="28" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1"/>
    <text x="30" y="18" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif">Forget</text>
    <rect x="70" width="60" height="28" rx="6" fill="white" opacity="0.25" stroke="white" stroke-width="1"/>
    <text x="100" y="18" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif">Input</text>
    <rect x="140" width="60" height="28" rx="6" fill="white" opacity="0.3" stroke="white" stroke-width="1"/>
    <text x="170" y="18" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif">Output</text>
    <rect x="210" width="60" height="28" rx="6" fill="white" opacity="0.15" stroke="white" stroke-width="1"/>
    <text x="240" y="18" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif">Cell State</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">RNNs &amp; LSTMs</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Axes -->
  <line x1="60" y1="20" x2="60" y2="170" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="170" x2="360" y2="170" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="30" y="95" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.6" transform="rotate(-90,30,95)">Gradient Norm</text>
  <text x="210" y="190" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.6">Layer Depth →</text>
  <!-- Vanishing gradient curve (exponential decay) -->
  <path d="M70 30 C100 35 140 60 180 100 C220 130 260 150 300 158 C330 162 350 165 360 166" stroke="#fca5a5" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="365" y="162" fill="#fca5a5" font-size="8" font-family="sans-serif">Vanishing</text>
  <!-- Exploding gradient curve -->
  <path d="M70 160 C100 155 140 140 180 110 C220 70 260 40 300 25 C330 18 350 12 360 8" stroke="#86efac" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="365" y="14" fill="#86efac" font-size="8" font-family="sans-serif">Exploding</text>
  <!-- Healthy gradient (with residual) -->
  <path d="M70 80 C100 82 140 85 180 88 C220 90 260 92 300 93 C330 94 350 94 360 95" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="365" y="100" fill="white" font-size="8" font-family="sans-serif">Residual ✓</text>
  <!-- Skip connection illustration -->
  <g transform="translate(100,100)">
    <rect x="0" y="0" width="30" height="30" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1"/>
    <rect x="50" y="0" width="30" height="30" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1"/>
    <rect x="100" y="0" width="30" height="30" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1"/>
    <path d="M30 15 L50 15" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <path d="M80 15 L100 15" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Skip connection arc -->
    <path d="M15 0 C15 -20 115 -20 115 0" stroke="white" stroke-width="2" fill="none" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="65" y="-14" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif" opacity="0.6">skip</text>
  </g>
  <text x="200" y="212" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Vanishing &amp; Exploding Gradients</text>
</svg>

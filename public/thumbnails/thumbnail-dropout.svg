<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e11d48"/><stop offset="100%" stop-color="#be123c"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Network with dropout -->
  <g transform="translate(60,30)">
    <!-- Layer 1 -->
    <circle cx="30" cy="20" r="12" fill="white" opacity="0.6" stroke="white" stroke-width="1.5"/>
    <circle cx="30" cy="60" r="12" fill="white" opacity="0.15" stroke="white" stroke-width="1.5" stroke-dasharray="3 2"/>
    <circle cx="30" cy="100" r="12" fill="white" opacity="0.5" stroke="white" stroke-width="1.5"/>
    <circle cx="30" cy="140" r="12" fill="white" opacity="0.6" stroke="white" stroke-width="1.5"/>
    <!-- Layer 2 -->
    <circle cx="140" cy="20" r="12" fill="white" opacity="0.5" stroke="white" stroke-width="1.5"/>
    <circle cx="140" cy="60" r="12" fill="white" opacity="0.6" stroke="white" stroke-width="1.5"/>
    <circle cx="140" cy="100" r="12" fill="white" opacity="0.15" stroke="white" stroke-width="1.5" stroke-dasharray="3 2"/>
    <circle cx="140" cy="140" r="12" fill="white" opacity="0.5" stroke="white" stroke-width="1.5"/>
    <!-- Layer 3 -->
    <circle cx="250" cy="40" r="12" fill="white" opacity="0.6" stroke="white" stroke-width="1.5"/>
    <circle cx="250" cy="80" r="12" fill="white" opacity="0.15" stroke="white" stroke-width="1.5" stroke-dasharray="3 2"/>
    <circle cx="250" cy="120" r="12" fill="white" opacity="0.5" stroke="white" stroke-width="1.5"/>
    <!-- Connections (faded) -->
    <g stroke="white" stroke-width="0.8" opacity="0.15">
      <line x1="42" y1="20" x2="128" y2="20"/><line x1="42" y1="20" x2="128" y2="60"/>
      <line x1="42" y1="100" x2="128" y2="20"/><line x1="42" y1="100" x2="128" y2="60"/>
      <line x1="42" y1="140" x2="128" y2="140"/><line x1="42" y1="140" x2="128" y2="100"/>
      <line x1="152" y1="20" x2="238" y2="40"/><line x1="152" y1="60" x2="238" y2="40"/>
      <line x1="152" y1="60" x2="238" y2="120"/><line x1="152" y1="140" x2="238" y2="120"/>
    </g>
  </g>
  <!-- X marks on dropped neurons -->
  <g fill="none" stroke="#fca5a5" stroke-width="2" opacity="0.7">
    <line x1="82" y1="82" x2="98" y2="98"/><line x1="98" y1="82" x2="82" y2="98"/>
    <line x1="192" y1="122" x2="208" y2="138"/><line x1="208" y1="122" x2="192" y2="138"/>
    <line x1="302" y1="100" x2="318" y2="116"/><line x1="318" y1="100" x2="302" y2="116"/>
  </g>
  <!-- Formula -->
  <g transform="translate(100,175)">
    <rect width="200" height="28" rx="6" fill="white" opacity="0.12"/>
    <text x="100" y="19" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" opacity="0.8">ĥ = r · h,  r ~ Bernoulli(p)</text>
  </g>
  <text x="200" y="215" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Dropout &amp; Regularization</text>
</svg>

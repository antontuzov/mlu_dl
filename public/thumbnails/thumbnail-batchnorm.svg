<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Normalized bars (before) -->
  <g transform="translate(40,40)">
    <text x="40" y="-8" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.7">Before</text>
    <rect x="0" y="20" width="16" height="80" rx="3" fill="white" opacity="0.2"/>
    <rect x="22" y="50" width="16" height="50" rx="3" fill="white" opacity="0.2"/>
    <rect x="44" y="0" width="16" height="100" rx="3" fill="white" opacity="0.2"/>
    <rect x="66" y="60" width="16" height="40" rx="3" fill="white" opacity="0.2"/>
  </g>
  <!-- Arrow -->
  <path d="M140 90 L170 90" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <text x="155" y="80" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.6">BN</text>
  <!-- Normalized bars (after) -->
  <g transform="translate(180,40)">
    <text x="40" y="-8" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.7">After</text>
    <rect x="0" y="25" width="16" height="50" rx="3" fill="white" opacity="0.5"/>
    <rect x="22" y="30" width="16" height="40" rx="3" fill="white" opacity="0.5"/>
    <rect x="44" y="20" width="16" height="60" rx="3" fill="white" opacity="0.5"/>
    <rect x="66" y="28" width="16" height="45" rx="3" fill="white" opacity="0.5"/>
  </g>
  <!-- Mean line -->
  <line x1="180" y1="90" x2="265" y2="90" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <!-- Formula -->
  <g transform="translate(80,150)">
    <rect width="240" height="35" rx="8" fill="white" opacity="0.12"/>
    <text x="120" y="22" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" opacity="0.8">x̂ = (x - μ) / √(σ² + ε) · γ + β</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Batch Normalization</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0d9488"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Encoder -->
  <rect x="30" y="35" width="70" height="130" rx="10" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
  <text x="65" y="80" fill="white" font-size="12" text-anchor="middle" font-family="sans-serif" font-weight="bold">Encoder</text>
  <text x="65" y="100" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.7">f(x) → z</text>
  <!-- Arrow -->
  <path d="M100 100 L145 100" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Latent space (bottleneck) -->
  <rect x="150" y="65" width="40" height="70" rx="8" fill="white" opacity="0.4" stroke="white" stroke-width="2"/>
  <text x="170" y="95" fill="#0d9488" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="bold">z</text>
  <text x="170" y="110" fill="#0d9488" font-size="7" text-anchor="middle" font-family="sans-serif">latent</text>
  <!-- Arrow -->
  <path d="M195 100 L240 100" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Decoder -->
  <rect x="245" y="35" width="70" height="130" rx="10" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
  <text x="280" y="80" fill="white" font-size="12" text-anchor="middle" font-family="sans-serif" font-weight="bold">Decoder</text>
  <text x="280" y="100" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.7">g(z) → x̂</text>
  <!-- Output arrow -->
  <path d="M315 100 L345 100" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <text x="360" y="104" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" opacity="0.7">x̂</text>
  <!-- VAE distribution -->
  <g transform="translate(120,150)">
    <rect width="160" height="30" rx="6" fill="white" opacity="0.1"/>
    <text x="80" y="20" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.8">μ + σ · ε,  ε ~ N(0,I)</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Autoencoders &amp; VAEs</text>
</svg>

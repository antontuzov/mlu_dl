<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#764ba2"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Grid of convolved cells -->
  <g opacity="0.15"><rect x="20" y="20" width="360" height="185" rx="8" fill="white"/></g>
  <!-- Input feature map -->
  <g transform="translate(40,40)">
    <rect width="80" height="80" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1.5"/>
    <rect x="10" y="10" width="25" height="25" rx="3" fill="white" opacity="0.5"/>
    <rect x="10" y="40" width="25" height="25" rx="3" fill="white" opacity="0.3"/>
    <rect x="40" y="10" width="25" height="25" rx="3" fill="white" opacity="0.4"/>
    <rect x="40" y="40" width="25" height="25" rx="3" fill="white" opacity="0.6"/>
  </g>
  <!-- Kernel -->
  <g transform="translate(155,55)">
    <rect width="50" height="50" rx="6" fill="white" opacity="0.35" stroke="white" stroke-width="2"/>
    <rect x="5" y="5" width="14" height="14" rx="2" fill="white" opacity="0.6"/>
    <rect x="22" y="5" width="14" height="14" rx="2" fill="white" opacity="0.4"/>
    <rect x="5" y="22" width="14" height="14" rx="2" fill="white" opacity="0.5"/>
    <rect x="22" y="22" width="14" height="14" rx="2" fill="white" opacity="0.7"/>
  </g>
  <!-- Arrow -->
  <path d="M215 80 L245 80" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M240 75 L248 80 L240 85" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Output feature map -->
  <g transform="translate(260,40)">
    <rect width="80" height="80" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1.5"/>
    <rect x="5" y="5" width="30" height="30" rx="4" fill="white" opacity="0.7"/>
    <rect x="40" y="5" width="30" height="30" rx="4" fill="white" opacity="0.4"/>
    <rect x="5" y="40" width="30" height="30" rx="4" fill="white" opacity="0.5"/>
    <rect x="40" y="40" width="30" height="30" rx="4" fill="white" opacity="0.8"/>
  </g>
  <!-- Pooling layer -->
  <g transform="translate(60,140)">
    <rect width="280" height="45" rx="8" fill="white" opacity="0.12"/>
    <rect x="15" y="8" width="28" height="28" rx="4" fill="white" opacity="0.3"/>
    <rect x="55" y="8" width="28" height="28" rx="4" fill="white" opacity="0.4"/>
    <rect x="95" y="8" width="28" height="28" rx="4" fill="white" opacity="0.5"/>
    <rect x="135" y="8" width="28" height="28" rx="4" fill="white" opacity="0.35"/>
    <rect x="185" y="8" width="80" height="28" rx="4" fill="white" opacity="0.25"/>
    <text x="225" y="27" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif">FC</text>
  </g>
  <!-- Title -->
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Convolutional Neural Networks</text>
</svg>

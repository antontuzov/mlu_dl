<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f43f5e"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Generator -->
  <g transform="translate(30,50)">
    <rect width="110" height="80" rx="14" fill="white" opacity="0.15" stroke="white" stroke-width="2"/>
    <text x="55" y="35" fill="white" font-size="18" text-anchor="middle" font-family="sans-serif" font-weight="bold">Generator</text>
    <text x="55" y="55" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">G(z)</text>
    <!-- Noise input -->
    <text x="55" y="100" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif" opacity="0.6">noise z ~ N(0,I)</text>
  </g>
  <!-- Arrow -->
  <path d="M145 90 L175 90" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <text x="160" y="82" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">fake</text>
  <!-- Discriminator -->
  <g transform="translate(180,50)">
    <rect width="120" height="80" rx="14" fill="white" opacity="0.2" stroke="white" stroke-width="2"/>
    <text x="60" y="35" fill="white" font-size="16" text-anchor="middle" font-family="sans-serif" font-weight="bold">Discriminator</text>
    <text x="60" y="55" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.7">D(x)</text>
  </g>
  <!-- Arrow to output -->
  <path d="M305 90 L335 90" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <rect x="340" y="72" width="35" height="36" rx="8" fill="white" opacity="0.3" stroke="white" stroke-width="1.5"/>
  <text x="357" y="95" fill="white" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="bold">0/1</text>
  <!-- Real data path -->
  <rect x="30" y="15" width="80" height="28" rx="6" fill="white" opacity="0.2" stroke="white" stroke-width="1"/>
  <text x="70" y="33" fill="white" font-size="9" text-anchor="middle" font-family="sans-serif">Real Data</text>
  <path d="M110 29 L240 29 L240 50" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="175" y="22" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.6">real</text>
  <!-- Minimax formula -->
  <g transform="translate(60,150)">
    <rect width="280" height="40" rx="8" fill="white" opacity="0.1"/>
    <text x="140" y="25" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.8">min_G  max_D  V(D,G)</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Generative Adversarial Networks</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Source model -->
  <g transform="translate(20,30)">
    <rect width="130" height="130" rx="14" fill="white" opacity="0.12" stroke="white" stroke-width="1.5"/>
    <text x="65" y="25" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="bold">Source Task</text>
    <text x="65" y="42" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.6">ImageNet / Wikipedia</text>
    <rect x="15" y="55" width="100" height="16" rx="4" fill="white" opacity="0.25"/>
    <rect x="15" y="77" width="100" height="16" rx="4" fill="white" opacity="0.3"/>
    <rect x="15" y="99" width="100" height="16" rx="4" fill="white" opacity="0.35"/>
    <text x="65" y="126" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif" opacity="0.6">Pretrained Weights</text>
  </g>
  <!-- Transfer arrow -->
  <path d="M155 95 L195 95" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M190 88 L200 95 L190 102" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="177" y="85" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.7">Transfer</text>
  <!-- Target model -->
  <g transform="translate(205,30)">
    <rect width="130" height="130" rx="14" fill="white" opacity="0.12" stroke="white" stroke-width="1.5"/>
    <text x="65" y="25" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="bold">Target Task</text>
    <text x="65" y="42" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.6">Your Dataset</text>
    <rect x="15" y="55" width="100" height="16" rx="4" fill="white" opacity="0.2"/>
    <rect x="15" y="77" width="100" height="16" rx="4" fill="white" opacity="0.25"/>
    <rect x="15" y="99" width="100" height="16" rx="4" fill="#10b981" opacity="0.5"/>
    <text x="65" y="111" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif" font-weight="bold">New Head</text>
    <text x="65" y="126" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif" opacity="0.6">Fine-tuned Weights</text>
  </g>
  <!-- LoRA -->
  <g transform="translate(345,50)">
    <rect width="45" height="80" rx="8" fill="white" opacity="0.15" stroke="white" stroke-width="1"/>
    <text x="22" y="30" fill="white" font-size="8" text-anchor="middle" font-family="sans-serif" font-weight="bold">LoRA</text>
    <text x="22" y="45" fill="white" font-size="6" text-anchor="middle" font-family="sans-serif" opacity="0.7">W₀+BA</text>
    <text x="22" y="65" fill="white" font-size="6" text-anchor="middle" font-family="sans-serif" opacity="0.5">r ≪ d</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Transfer Learning</text>
</svg>

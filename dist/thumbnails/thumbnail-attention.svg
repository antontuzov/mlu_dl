<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Crosshairs/target -->
  <circle cx="200" cy="90" r="60" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <circle cx="200" cy="90" r="40" fill="none" stroke="white" stroke-width="2" opacity="0.35"/>
  <circle cx="200" cy="90" r="20" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="90" r="6" fill="white" opacity="0.9"/>
  <!-- Cross lines -->
  <line x1="200" y1="20" x2="200" y2="45" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="135" x2="200" y2="160" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="130" y1="90" x2="155" y2="90" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="245" y1="90" x2="270" y2="90" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Attention weights flowing -->
  <g transform="translate(50,30)">
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.4"/>
    <circle cx="0" cy="30" r="8" fill="white" opacity="0.3"/>
    <circle cx="0" cy="60" r="8" fill="white" opacity="0.5"/>
    <path d="M8 0 L30 20" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <path d="M8 30 L30 25" stroke="white" stroke-width="2.5" opacity="0.7"/>
    <path d="M8 60 L30 30" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Formula -->
  <g transform="translate(100,160)">
    <rect width="200" height="30" rx="6" fill="white" opacity="0.12"/>
    <text x="100" y="20" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif" opacity="0.8">αᵢⱼ = softmax(score(Q,K))</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Attention Mechanisms</text>
</svg>

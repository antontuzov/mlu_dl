<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Attention matrix -->
  <g transform="translate(40,25)">
    <rect width="130" height="130" rx="8" fill="white" opacity="0.08"/>
    <!-- Attention cells - varying opacity to show attention patterns -->
    <rect x="5" y="5" width="18" height="18" rx="3" fill="white" opacity="0.7"/>
    <rect x="27" y="5" width="18" height="18" rx="3" fill="white" opacity="0.3"/>
    <rect x="49" y="5" width="18" height="18" rx="3" fill="white" opacity="0.15"/>
    <rect x="71" y="5" width="18" height="18" rx="3" fill="white" opacity="0.1"/>
    <rect x="93" y="5" width="18" height="18" rx="3" fill="white" opacity="0.2"/>
    <rect x="5" y="27" width="18" height="18" rx="3" fill="white" opacity="0.2"/>
    <rect x="27" y="27" width="18" height="18" rx="3" fill="white" opacity="0.6"/>
    <rect x="49" y="27" width="18" height="18" rx="3" fill="white" opacity="0.4"/>
    <rect x="71" y="27" width="18" height="18" rx="3" fill="white" opacity="0.15"/>
    <rect x="93" y="27" width="18" height="18" rx="3" fill="white" opacity="0.1"/>
    <rect x="5" y="49" width="18" height="18" rx="3" fill="white" opacity="0.15"/>
    <rect x="27" y="49" width="18" height="18" rx="3" fill="white" opacity="0.25"/>
    <rect x="49" y="49" width="18" height="18" rx="3" fill="white" opacity="0.7"/>
    <rect x="71" y="49" width="18" height="18" rx="3" fill="white" opacity="0.5"/>
    <rect x="93" y="49" width="18" height="18" rx="3" fill="white" opacity="0.2"/>
    <rect x="5" y="71" width="18" height="18" rx="3" fill="white" opacity="0.1"/>
    <rect x="27" y="71" width="18" height="18" rx="3" fill="white" opacity="0.15"/>
    <rect x="49" y="71" width="18" height="18" rx="3" fill="white" opacity="0.3"/>
    <rect x="71" y="71" width="18" height="18" rx="3" fill="white" opacity="0.65"/>
    <rect x="93" y="71" width="18" height="18" rx="3" fill="white" opacity="0.4"/>
    <rect x="5" y="93" width="18" height="18" rx="3" fill="white" opacity="0.2"/>
    <rect x="27" y="93" width="18" height="18" rx="3" fill="white" opacity="0.1"/>
    <rect x="49" y="93" width="18" height="18" rx="3" fill="white" opacity="0.15"/>
    <rect x="71" y="93" width="18" height="18" rx="3" fill="white" opacity="0.35"/>
    <rect x="93" y="93" width="18" height="18" rx="3" fill="white" opacity="0.7"/>
  </g>
  <!-- Q K V boxes -->
  <g transform="translate(200,30)">
    <rect width="55" height="40" rx="8" fill="white" opacity="0.25" stroke="white" stroke-width="1.5"/>
    <text x="27" y="25" fill="white" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="bold">Q</text>
    <rect x="65" width="55" height="40" rx="8" fill="white" opacity="0.2" stroke="white" stroke-width="1.5"/>
    <text x="92" y="25" fill="white" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="bold">K</text>
    <rect x="130" width="55" height="40" rx="8" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
    <text x="157" y="25" fill="white" font-size="14" text-anchor="middle" font-family="sans-serif" font-weight="bold">V</text>
  </g>
  <!-- Formula -->
  <g transform="translate(200,90)">
    <rect width="180" height="35" rx="8" fill="white" opacity="0.1"/>
    <text x="90" y="23" fill="white" font-size="11" text-anchor="middle" font-family="sans-serif" opacity="0.85">softmax(QKᵀ / √dₖ) V</text>
  </g>
  <!-- Multi-head -->
  <g transform="translate(200,140)">
    <rect width="40" height="25" rx="5" fill="white" opacity="0.2"/>
    <text x="20" y="17" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif">Head 1</text>
    <rect x="48" width="40" height="25" rx="5" fill="white" opacity="0.25"/>
    <text x="68" y="17" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif">Head 2</text>
    <rect x="96" width="40" height="25" rx="5" fill="white" opacity="0.3"/>
    <text x="116" y="17" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif">Head 3</text>
    <rect x="144" width="40" height="25" rx="5" fill="white" opacity="0.2"/>
    <text x="164" y="17" fill="white" font-size="7" text-anchor="middle" font-family="sans-serif">Head h</text>
  </g>
  <text x="200" y="210" fill="white" font-size="13" text-anchor="middle" font-family="sans-serif" font-weight="bold" opacity="0.9">Transformers &amp; Self-Attention</text>
</svg>
